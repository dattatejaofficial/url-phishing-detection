name: Model Retraining Pipeline

on:
  workflow_dispatch:

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Start Azure VM
        run: |
          az vm start \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.VM_NAME }}

      - name: Wait for VM
        run: sleep 60

      - name: Trigger training on VM
        run: |
          az vm run-command invoke \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.VM_NAME }} \
            --command-id RunShellScript \
            --scripts "
              VM_USERNAME='${{ secrets.VM_USERNAME }}'
              WORKDIR=/home/\$VM_USERNAME/url-phishing-detection

              rm -f \$WORKDIR/TRAINING_DONE \$WORKDIR/TRAINING_FAILED

              sudo -u \$VM_USERNAME bash -c '
                export MONGODB_URI=\"${{ secrets.MONGODB_URI }}\"
                export AZURE_STORAGE_CONNECTION_STRING=\"${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}\"
                export AZURE_ARTIFACT_STORAGE_CONNECTION_STRING=\"${{ secrets.AZURE_ARTIFACT_STORAGE_CONNECTION_STRING }}\"
                export AZURE_BLOB_ARTIFACT_CONTAINER=\"${{ secrets.AZURE_BLOB_ARTIFACT_CONTAINER }}\"
                export AZURE_BLOB_MLFLOW_ARTIFACT_CONTAINER=\"${{ secrets.AZURE_BLOB_MLFLOW_ARTIFACT_CONTAINER }}\"
                export MLFLOW_TRACKING_URI=\"http://127.0.0.1:5000\"

                cd /home/\$USER/url-phishing-detection

                nohup bash scripts/retrain.sh \
                  > run.log 2>&1 < /dev/null &
              '
            "

      - name: Wait for training completion
        run: |
          echo "Polling VM..."

          MAX_ATTEMPTS=120
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            RESULT=$(az vm run-command invoke \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --name ${{ secrets.VM_NAME }} \
              --command-id RunShellScript \
              --query "value[0].message" \
              --output tsv \
              --scripts "
                if [ -f /home/${{ secrets.VM_USERNAME }}/url-phishing-detection/TRAINING_DONE ]; then
                  echo DONE
                elif [ -f /home/${{ secrets.VM_USERNAME }}/url-phishing-detection/TRAINING_FAILED ]; then
                  echo FAILED
                else
                  echo RUNNING
                fi
              ")

            echo "Attempt $ATTEMPT → $RESULT"

            if [[ "$RESULT" == *"DONE"* ]]; then
              echo "Training completed!"
              exit 0
            fi

            if [[ "$RESULT" == *"FAILED"* ]]; then
              echo "Training failed!"
              exit 1
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 30
          done

          echo "Timeout waiting for training"
          exit 1

      - name: Fetch logs
        if: always()
        run: |
          az vm run-command invoke \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.VM_NAME }} \
            --command-id RunShellScript \
            --scripts "
              echo '=== RUN LOG ==='
              tail -n 100 /home/${{ secrets.VM_USERNAME }}/url-phishing-detection/run.log

              echo '=== TRAINING LOG ==='
              tail -n 100 /home/${{ secrets.VM_USERNAME }}/url-phishing-detection/training.log
            "

      - name: Stop Azure VM
        if: always()
        run: |
          az vm deallocate \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.VM_NAME }}